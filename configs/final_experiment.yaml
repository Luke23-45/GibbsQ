# Final publication-grade configuration
# Usage: python scripts/execution/experiment_runner.py <experiment> --config-name final_experiment

system:
  num_servers: 10
  arrival_rate: 11.2
  service_rates: [0.5, 0.7, 0.9, 1.1, 1.3, 1.5, 1.7, 1.9, 2.1, 2.3]  # Lambda=14.0, rho=0.8
  alpha: 1.0

simulation:
  num_replications: 64
  seed: 42
  burn_in_fraction: 0.2
  export_trajectories: true
  ssa:
    sim_time: 20000.0
    sample_interval: 1.0
  dga:
    sim_steps: 5000
    temperature: 0.5

policy:
  name: uas
  d: 2

drift:
  q_max: 120
  use_grid: true

stress:
  n_values: [8, 32, 128, 512, 1024]
  critical_rhos: [0.90, 0.95, 0.98, 0.99]
  mu_het: [10.0, 0.1, 0.1, 0.1]
  sample_interval: 1.0
  massive_n_rho: 0.8
  massive_n_sim_time: 500.0
  critical_load_n: 10
  critical_load_base_rho: 0.8
  critical_load_max_sim_time: 100000.0
  heterogeneity_rho: 0.5
  heterogeneity_sim_time: 1000.0

generalization:
  rho_boundary_vals: [0.90, 0.95, 0.98, 0.99]
  scale_vals: [0.5, 1.0, 2.0, 5.0, 10.0]
  rho_grid_vals: [0.5, 0.7, 0.85, 0.95, 0.98]

stability_sweep:
  alpha_vals: [0.01, 0.1, 0.5, 1.0, 2.0, 5.0, 10.0, 20.0, 50.0, 100.0]
  rho_vals: [0.5, 0.7, 0.8, 0.9, 0.95, 0.98, 0.99]

neural_training:
  learning_rate: 3e-3
  dga_learning_rate: 0.1
  weight_decay: 1e-4
  min_temperature: 0.3
  gamma: 0.99
  gae_lambda: 0.95
  curriculum:
    - [20, 500]
    - [30, 2000]
    - [50, 5000]
  eval_batches: 5
  eval_trajs_per_batch: 10
  perf_index_min_denom: 0.5
  perf_index_jsq_margin: 0.05
  bc_num_steps: 1000
  bc_lr: 0.002
  bc_label_smoothing: 0.1
  shake_scale: 0.01
  checkpoint_freq: 25
  squash_scale: 100.0
  squash_threshold: 500.0

neural:
  hidden_size: 128
  preprocessing: log1p
  init_type: zero_final
  use_rho: true
  use_service_rates: true
  rho_input_scale: 10.0
  entropy_bonus: 0.01
  entropy_final: 0.001
  clip_global_norm: 0.5
  actor_lr: 0.0003
  critic_lr: 0.001
  lr_decay_rate: 0.9
  weight_decay: 0.0001

domain_randomization:
  enabled: true
  rho_min: 0.45
  rho_max: 0.95

jax:
  enabled: true
  platform: auto
  precision: float32
  fallback_to_cpu: true

jax_engine:
  max_events_safety_multiplier: 1.5
  max_events_additive_buffer: 1000
  scan_sampling_chunk: 16

verification:
  parity_threshold_percent: 25.0
  jacobian_rel_tol: 0.05
  alpha_significance: 0.05
  confidence_interval: 0.95
  stationarity_threshold: 0.5
  parity_z_score: 1.96
  gradient_check_chunk_size: 1500
  gradient_check_max_steps: 300
  gradient_check_n_test: 50
  gradient_check_sim_time: 15.0
  gradient_check_n_samples: 15000
  gradient_check_epsilon: 0.05
  gradient_check_cosine_threshold: 0.9
  gradient_check_error_threshold: 0.40
  gradient_shake_scale: 0.1

wandb:
  enabled: false
  project: GibbsQ
  mode: offline
  run_name: final

output_dir: outputs/final
log_dir: ${output_dir}/logs

train_epochs: 60
batch_size: 32
debug: false
