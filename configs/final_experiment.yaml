# Final self-contained profile configuration

system:
  num_servers: 10
  arrival_rate: 11.2
  service_rates: [0.5, 0.7, 0.9, 1.1, 1.3, 1.5, 1.7, 1.9, 2.1, 2.3]
  alpha: 1.0

simulation:
  num_replications: 64
  seed: 42
  burn_in_fraction: 0.2
  export_trajectories: true
  ssa:
    sim_time: 20000.0
    sample_interval: 1.0
  dga:
    sim_steps: 5000
    temperature: 0.5

policy:
  name: uas
  d: 2

drift:
  q_max: 120
  use_grid: true

stress:
  n_values: [8, 32, 128, 512, 1024]
  critical_rhos: [0.90, 0.92, 0.95, 0.97, 0.98, 0.985, 0.99]
  mu_het: [10.0, 0.1, 0.1, 0.1]
  sample_interval: 1.0
  massive_n_rho: 0.8
  massive_n_sim_time: 500.0
  critical_load_n: 10
  critical_load_base_rho: 0.8
  critical_load_max_sim_time: 400000.0
  heterogeneity_rho: 0.5
  heterogeneity_sim_time: 1000.0

generalization:
  rho_boundary_vals: [0.90, 0.92, 0.95, 0.97, 0.98, 0.985, 0.99]
  scale_vals: [0.5, 1.0, 2.0, 5.0, 10.0]
  rho_grid_vals: [0.5, 0.7, 0.85, 0.95, 0.98]
  rho_boundary_threshold: 0.95

stability_sweep:
  alpha_vals: [0.01, 0.1, 0.5, 1.0, 2.0, 5.0, 10.0, 20.0, 50.0, 100.0]
  rho_vals: [0.5, 0.7, 0.8, 0.9, 0.95, 0.98, 0.99]

neural_training:
  learning_rate: 3e-3
  dga_learning_rate: 0.1
  weight_decay: 1e-4
  min_temperature: 0.3
  gamma: 0.99
  gae_lambda: 0.95
  curriculum:
    - [20, 500]
    - [30, 2000]
    - [50, 5000]
  eval_batches: 5
  eval_trajs_per_batch: 10
  perf_index_min_denom: 0.5
  perf_index_jsq_margin: 0.05
  bc_num_steps: 1000
  bc_lr: 0.002
  bc_label_smoothing: 0.1
  shake_scale: 0.01
  checkpoint_freq: 25
  squash_scale: 100.0
  squash_threshold: 500.0

neural:
  hidden_size: 128
  preprocessing: log1p
  init_type: zero_final
  use_rho: true
  use_service_rates: true
  rho_input_scale: 10.0
  entropy_bonus: 0.01
  entropy_final: 0.001
  clip_global_norm: 0.5
  actor_lr: 0.0003
  critic_lr: 0.001
  lr_decay_rate: 0.9
  weight_decay: 0.0001

bc_data:
  rhos: [0.45, 0.65, 0.85]
  mu_scales: [0.5, 1.0, 2.0]
  samples_per_rho: 1000
  expert_sim_time: 1500.0
  sample_interval: 1.0
  augmentation_noise_min: -1
  augmentation_noise_max: 1

domain_randomization:
  enabled: true
  rho_min: 0.45
  rho_max: 0.95

jax:
  enabled: false
  platform: auto
  precision: float32
  fallback_to_cpu: true

jax_engine:
  max_events_safety_multiplier: 1.5
  max_events_additive_buffer: 1000
  scan_sampling_chunk: 16

verification:
  parity_threshold_percent: 25.0
  jacobian_rel_tol: 0.05
  alpha_significance: 0.05
  confidence_interval: 0.95
  stationarity_threshold: 1.0
  parity_z_score: 1.96
  gradient_check_chunk_size: 1500
  gradient_check_max_steps: 300
  gradient_check_n_test: 50
  gradient_check_sim_time: 15.0
  gradient_check_n_samples: 15000
  gradient_check_epsilon: 0.05
  gradient_check_cosine_threshold: 0.9
  gradient_check_error_threshold: 0.40
  gradient_shake_scale: 0.1

engine_parity:
  mode: full
  policies: [jsq, jssq, uas, calibrated_uas]
  include_policy_contract: true
  include_stats_contract: true
  include_generalize_contract: true
  include_critical_contract: true
  quick_num_replications: 4
  full_num_replications: 16
  quick_generalize_max_cells: 4
  quick_critical_max_rhos: 2
  equivalence_ci_level: 0.90
  equivalence_abs_margin: 0.25
  equivalence_rel_margin: 0.02

wandb:
  enabled: false
  project: GibbsQ
  mode: offline
  run_name: final

output_dir: outputs/final
log_dir: ${output_dir}/logs
train_epochs: 60
batch_size: 32

experiments:
  check_configs: {}
  hyperqual:
    study:
      stage: C
      mode: full
      candidate_manifest: null
      candidate_count: 4
      promote_top_k: 2
      seed_values: []
      random_seed: 20260331
      full_certification: true
      allow_wandb: false
  reinforce_check:
    system:
      num_servers: 2
      arrival_rate: 1.0
      service_rates: [1.0, 1.5]
      alpha: 1.0
    neural:
      hidden_size: 128
      preprocessing: log1p
      init_type: zero_final
      use_rho: true
      use_service_rates: true
      rho_input_scale: 10.0
      entropy_bonus: 0.01
      entropy_final: 0.001
      clip_global_norm: 0.5
      actor_lr: 0.0003
      critic_lr: 0.003
      lr_decay_rate: 0.9
      weight_decay: 0.0001
    jax:
      enabled: false
      platform: auto
      precision: float32
      fallback_to_cpu: true
    verification:
      gradient_check_chunk_size: 500
      gradient_check_max_steps: 100
      gradient_check_n_test: 50
      gradient_check_hidden_size: null
      gradient_check_sim_time: 10.0
      gradient_check_n_samples: 5000
      gradient_check_epsilon: 0.05
      gradient_check_cosine_threshold: 0.9
      gradient_check_error_threshold: 0.40
      gradient_shake_scale: 0.1
  engine_parity:
    jax:
      enabled: true
      platform: auto
      precision: float64
      fallback_to_cpu: true
  drift:
    policy:
      name: softmax
      d: 2
    jax:
      enabled: false
      platform: auto
      precision: float32
      fallback_to_cpu: true
  sweep:
    jax:
      enabled: true
      platform: auto
      precision: float32
      fallback_to_cpu: true
    wandb:
      enabled: true
      mode: offline
      project: GibbsQ-Paper
      group: stability_sweep
  stress:
    jax:
      enabled: true
      platform: auto
      precision: float32
      fallback_to_cpu: true
  policy:
    # Final CPU policy comparison: trim replications, horizon, and optional
    # grid coverage so tier+grid remains practical without changing logic.
    jax:
      enabled: false
      platform: auto
      precision: float32
      fallback_to_cpu: true
    simulation:
      num_replications: 32
      ssa:
        sim_time: 15000.0
    generalization:
      rho_grid_vals: [0.5, 0.7, 0.85, 0.95]
    wandb:
      enabled: true
      mode: offline
      project: GibbsQ-Paper
      group: policy_evaluation
  bc_train: {}
  reinforce_train:
    # Final bounded training budget: keep this capped for the CPU/SSA-heavy
    # rollout path instead of inheriting the much larger root training budget.
    jax:
      enabled: false
      platform: auto
      precision: float32
      fallback_to_cpu: true
    simulation:
      ssa:
        sim_time: 1000.0
    train_epochs: 15
    batch_size: 16
  stats:
    jax:
      enabled: false
      platform: auto
      precision: float32
      fallback_to_cpu: true
    simulation:
      num_replications: 30
  generalize:
    # Final standalone generalization run: use a trimmed 4x4 grid with a
    # balanced replication count and full SSA horizon.
    jax:
      enabled: false
      platform: auto
      precision: float32
      fallback_to_cpu: true
    simulation:
      num_replications: 3
      ssa:
        sim_time: 15000.0
    generalization:
      scale_vals: [0.5, 1.0, 2.0, 5.0]
      rho_grid_vals: [0.5, 0.7, 0.85, 0.95]
  ablation:
    # Ablation keeps the same evaluation-facing config chain, but it uses a
    # cheaper trainer-only budget for the per-variant REINFORCE runs.
    jax:
      enabled: false
      platform: auto
      precision: float32
      fallback_to_cpu: true
    ablation_training:
      train_epochs: 8
      batch_size: 8
      simulation:
        ssa:
          sim_time: 750.0
      neural_training:
        eval_batches: 1
        eval_trajs_per_batch: 3
        checkpoint_freq: 25
  critical:
    # Final critical-load coverage remains standalone with a trimmed
    # near-critical grid to stay within the runtime budget.
    jax:
      enabled: false
      platform: auto
      precision: float32
      fallback_to_cpu: true
    simulation:
      num_replications: 2
    generalization:
      rho_boundary_vals: [0.90, 0.95, 0.97, 0.98]
