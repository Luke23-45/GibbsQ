# Debug Stress Test Configuration
# ================================
# Ultra-fast configuration for debugging stress test execution flow.
# Uses minimal sim_time and smallest N/rho values.
# Expected completion: <30 seconds on CPU.
#
# Usage:
#   python -m experiments.testing.stress_test ++jax.enabled=True --config-name debug_stress

system:
  num_servers: 2
  arrival_rate: 1.0
  service_rates: [1.0, 1.5]
  alpha: 1.0

simulation:
  num_replications: 2
  seed: 42
  burn_in_fraction: 0.2
  export_trajectories: false
  ssa:
    sim_time: 100.0
    sample_interval: 1.0
  dga:
    sim_steps: 100
    temperature: 0.5

policy:
  name: softmax
  d: 2

drift:
  q_max: 10
  use_grid: true

stress:
  n_values: [2, 4]
  critical_rhos: [0.5, 0.9]

stability_sweep:
  alpha_vals: [1.0]
  rho_vals: [0.5]

neural_training:
  learning_rate: 3e-3
  dga_learning_rate: 1e-3
  weight_decay: 1e-4
  curriculum:
    - [5, 100]

jax:
  enabled: true
  platform: auto
  precision: float32
  fallback_to_cpu: true

wandb:
  enabled: false
  project: GibbsQ-Debug

output_dir: outputs/debug
debug: true
