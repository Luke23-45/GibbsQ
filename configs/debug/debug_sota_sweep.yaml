# Debug config for SOTA optimization - reduced scale for quick verification
# Based on default.yaml but with smaller grid for rapid testing

defaults:
  - /@_global_

system:
  num_servers: 2  # Reduced for speed
  arrival_rate: 2.0
  service_rates: [1.0, 1.0]  # Homogeneous, Λ=2.0
  alpha: 1.0

simulation:
  num_replications: 10  # Reduced for speed
  seed: 42
  burn_in_fraction: 0.2
  export_trajectories: false
  ssa:
    sim_time: 2000.0  # Reduced for speed
    sample_interval: 1.0

policy:
  name: softmax
  d: 2

drift:
  q_max: 50
  use_grid: true

# PATCHED: Extended alpha sweep
stability_sweep:
  alpha_vals: [0.1, 1.0, 5.0, 10.0, 20.0, 50.0, 100.0]  # P1: Extended range
  rho_vals: [0.80, 0.90, 0.95, 0.98]  # P2: Heavy-traffic focus

jax:
  enabled: false

wandb:
  enabled: false

output_dir: outputs
debug: true
