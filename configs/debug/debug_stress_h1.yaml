# Hypothesis 1: JIT Compilation Time Test
# Ultra-minimal parameters to test if JIT compilation itself is the bottleneck.
# If this takes >30s, compilation is the problem, not event count.

system:
  num_servers: 2
  arrival_rate: 1.0
  service_rates: [1.0, 1.5]
  alpha: 1.0

simulation:
  num_replications: 1
  seed: 42
  burn_in_fraction: 0.2
  export_trajectories: false
  ssa:
    sim_time: 10.0
    sample_interval: 1.0
  dga:
    sim_steps: 100
    temperature: 0.5

policy:
  name: softmax
  d: 2

drift:
  q_max: 10
  use_grid: true

stress:
  n_values: [2]
  critical_rhos: [0.5]

stability_sweep:
  alpha_vals: [1.0]
  rho_vals: [0.5]

neural_training:
  learning_rate: 3e-3
  dga_learning_rate: 1e-3
  weight_decay: 1e-4
  curriculum:
    - [5, 100]

jax:
  enabled: true
  platform: auto
  precision: float32
  fallback_to_cpu: true

wandb:
  enabled: false
  project: GibbsQ-Debug

output_dir: outputs/debug
debug: true
