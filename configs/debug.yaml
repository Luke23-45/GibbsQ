# Small system for quick validation
# PATCH 2026-03-12: Added stress: section.
# Without it, hydra_to_config falls back to StressConfig dataclass defaults
# which include n_values=[4,8,16,32,64] and critical_rhos=[0.95,0.98,0.99,0.995].
# For a "small" validation run N=32/64 are unnecessarily slow; rho=0.995 requires
# very long sim_time to reach stationarity and adds no value in quick CI runs.

system:
  num_servers: 2
  arrival_rate: 1.0
  service_rates: [1.0, 1.5]
  # Λ = 2.5, ρ = 0.4
  alpha: 1.0

simulation:
  num_replications: 10
  seed: 42
  burn_in_fraction: 0.2
  export_trajectories: false
  ssa:
    sim_time: 5000.0  # Patch H4: Increased from 1000 for better steady-state estimation
    sample_interval: 1.0
  dga:
    sim_steps: 1000
    temperature: 0.5

policy:
  name: softmax
  d: 2

drift:
  q_max: 50
  use_grid: true

stability_sweep:
  alpha_vals: [0.1, 1.0, 5.0]
  rho_vals: [0.5, 0.8, 0.9]

# PATCH BUG-4: Explicit stress section — prevents StressConfig dataclass
# defaults from silently being used and avoids oversized N/rho combinations.
stress:
  n_values: [4, 8, 16]          # small validation; skip 32/64 for speed
  critical_rhos: [0.9, 0.95]   # two rho values sufficient for quick checks
  mu_het: [10.0, 0.1, 0.1, 0.1] # Extracted from stress_test.py
  sample_interval: 1.0
  massive_n_rho: 0.8
  massive_n_sim_time: 500.0
  critical_load_n: 10
  critical_load_base_rho: 0.8
  critical_load_max_sim_time: 100000.0
  heterogeneity_rho: 0.5
  heterogeneity_sim_time: 1000.0

neural_training:
  learning_rate: 3e-3
  dga_learning_rate: 0.1
  weight_decay: 1e-4
  min_temperature: 0.3   # HP#2 FIX: Raise floor to 0.3 to prevent late-stage loss regression (PR#2)
  gamma: 0.99            # Discount factor for returns
  gae_lambda: 0.95       # PATCH-P1: GAE λ for bias-variance tradeoff (Schulman 2015)
  curriculum:
    - [10, 200]
    - [20, 1000]
    - [20, 3000]
  eval_batches: 2           # Extracted logic: fast evaluation
  eval_trajs_per_batch: 5   # Extracted logic: fast evaluation
  perf_index_min_denom: 0.5
  perf_index_jsq_margin: 0.05
  bc_num_steps: 1000
  bc_lr: 0.002
  bc_label_smoothing: 0.1
  shake_scale: 0.01
  checkpoint_freq: 25
  squash_scale: 100.0
  squash_threshold: 500.0

jax:
  enabled: false
  platform: auto
  precision: float32
  fallback_to_cpu: true

wandb:
  enabled: false
  project: GibbsQ-Small
  
batch_size: 64  # PI-V4.3: Increased from 32 to 64 (Patch H2: CLT variance reduction)

neural:
  hidden_size: 128  # Patch H6: Increased from 64 for better policy expressiveness
  preprocessing: log1p
  init_type: zero_final
  use_rho: true
  rho_input_scale: 10.0
  entropy_bonus: 0.01  # STABILITY FIX: Increased from 0.001 to prevent premature policy collapse
  entropy_final: 0.001
  clip_global_norm: 0.5  # Patch H3: Reduced from 1.0 per PPO literature
  actor_lr: 0.0003  # actor learning rate (Patch H1: 3e-4 per PPO literature)
  critic_lr: 0.003 # Patch H7: Increased from 0.001 for faster baseline adaptation
  lr_decay_rate: 0.9
  weight_decay: 0.0001

train_epochs: 100  # FIX: Increased from 30 for more learning

# PATCH-P2: Domain Randomization for generalization
domain_randomization:
  enabled: true
  rho_min: 0.4
  rho_max: 0.85

generalization:
  rho_boundary_vals: [0.95]
  scale_vals: [0.5, 2.0]
  rho_grid_vals: [0.5, 0.85]

verification:
  alpha_significance: 0.05
  confidence_interval: 0.95
  stationarity_threshold: 0.5
  parity_z_score: 1.96
  gradient_check_chunk_size: 500  # Smaller chunks for fast debug
  gradient_check_max_steps: 100
  gradient_check_n_test: 500
  gradient_check_sim_time: 10.0
  gradient_check_n_samples: 5000  # Increased for FD convergence (was 2500)
  gradient_check_epsilon: 0.05  # CRN + aligned objectives; smaller ε drowns in SSA noise
  gradient_check_cosine_threshold: 0.9
  gradient_check_error_threshold: 0.30  # Tighter: objectives now aligned (was 0.40)
  gradient_shake_scale: 0.1

output_dir: outputs/small
