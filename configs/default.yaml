# Default experiment configuration

system:
  num_servers: 10
  arrival_rate: 11.2
  service_rates: [0.5, 0.7, 0.9, 1.1, 1.3, 1.5, 1.7, 1.9, 2.1, 2.3]
  # Λ = Σ μ_i = 14.0, ρ = 11.2/14.0 = 0.8
  alpha: 1.0

simulation:
  num_replications: 50  # P3: Increased for statistical power
  seed: 42
  burn_in_fraction: 0.2
  export_trajectories: false
  ssa:
    sim_time: 5000.0
    sample_interval: 1.0
  dga:
    sim_steps: 5000
    temperature: 0.5

policy:
  name: uas
  d: 2

drift:
  q_max: 50
  use_grid: true

stress:
  n_values: [8, 32, 128, 512, 1024]
  critical_rhos: [0.9, 0.95, 0.99]
  mu_het: [10.0, 0.1, 0.1, 0.1]
  sample_interval: 1.0
  massive_n_rho: 0.8
  massive_n_sim_time: 500.0
  critical_load_n: 10
  critical_load_base_rho: 0.8
  critical_load_max_sim_time: 100000.0
  heterogeneity_rho: 0.5
  heterogeneity_sim_time: 1000.0

generalization:
  rho_boundary_vals: [0.90, 0.95, 0.98, 0.99]
  scale_vals: [0.5, 1.0, 2.0, 5.0, 10.0]
  rho_grid_vals: [0.5, 0.7, 0.85, 0.95, 0.98]

stability_sweep:
  alpha_vals: [0.01, 0.1, 0.5, 1.0, 2.0, 5.0, 10.0, 20.0, 50.0, 100.0]  # P1: Extended for heavy-traffic optimization
  rho_vals: [0.5, 0.7, 0.8, 0.9, 0.95, 0.98, 0.99]  # P2: Added heavy-traffic regime

neural_training:
  learning_rate: 3e-3
  dga_learning_rate: 0.1
  weight_decay: 1e-4
  min_temperature: 0.3   # HP#2 FIX: Raise floor to 0.3 to prevent late-stage loss regression (PR#2)
  curriculum:
    - [20, 500]
    - [30, 2000]
    - [50, 5000]
  eval_batches: 5
  eval_trajs_per_batch: 10
  perf_index_min_denom: 0.5
  perf_index_jsq_margin: 0.05
  bc_num_steps: 1000
  bc_lr: 0.002
  bc_label_smoothing: 0.1
  shake_scale: 0.01
  checkpoint_freq: 25
  squash_scale: 100.0
  squash_threshold: 500.0
  gamma: 0.99
  gae_lambda: 0.95

neural:
  hidden_size: 64
  preprocessing: none
  init_type: xavier_uniform
  use_rho: true
  rho_input_scale: 1.0
  entropy_bonus: 0.01
  entropy_final: 0.001
  clip_global_norm: 0.5
  actor_lr: 0.001
  critic_lr: 0.001
  lr_decay_rate: 0.9
  weight_decay: 0.0001

domain_randomization:
  enabled: false
  rho_min: 0.4
  rho_max: 0.95

jax:
  enabled: false
  platform: auto
  precision: float32
  fallback_to_cpu: true

wandb:
  enabled: false
  project: GibbsQ
  mode: offline
  run_name: null

output_dir: outputs
log_dir: ${output_dir}/logs

verification:
  parity_threshold_percent: 25.0
  jacobian_rel_tol: 0.05
  alpha_significance: 0.05
  confidence_interval: 0.95
  stationarity_threshold: 0.5
  parity_z_score: 1.96
  gradient_check_chunk_size: 1500
  gradient_check_max_steps: 300
  gradient_check_n_test: 50
  gradient_check_sim_time: 15.0
  gradient_check_n_samples: 15000
  gradient_check_epsilon: 0.05
  gradient_check_cosine_threshold: 0.9
  gradient_check_error_threshold: 0.40
  gradient_shake_scale: 0.1

# Verification flags
train_epochs: 30
