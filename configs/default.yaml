# Default experiment configuration

system:
  num_servers: 10
  arrival_rate: 10.4
  service_rates: [0.5, 0.7, 0.9, 1.1, 1.3, 1.5, 1.7, 1.9, 2.1, 2.3]
  # Λ = Σ μ_i = 13.0, ρ = 10.4/13.0 = 0.8
  alpha: 1.0

simulation:
  sim_time: 10000.0
  sample_interval: 0.1
  num_replications: 5
  seed: 42
  burn_in_fraction: 0.2
  export_trajectories: false

policy:
  name: softmax
  d: 2

drift:
  q_max: 50
  use_grid: true

jax:
  enabled: false
  platform: auto
  precision: float64
  fallback_to_cpu: true

wandb:
  enabled: false
  project: MoEQ
  mode: online
  run_name: null

output_dir: outputs
log_dir: ${output_dir}/logs
