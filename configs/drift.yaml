# SOTA Configuration for Queueing System Stability Analysis
# Based on Phase 1 SOTA Parameter Objective Table (ledger/01_sota_targets.md)
# Verified by test_sota_verification.py - All 30 tests passed

# CRITICAL: This config targets heavy-traffic regime (ρ → 1)
# The Foster-Lyapunov proof from docs/gibbsq.md guarantees stability
# for any α > 0 provided Λ > λ (strict capacity condition)

system:
  num_servers: 2
  # SOTA: Critical load testing at ρ = 0.95
  # Λ = 2.5, λ = 2.375 → ρ = 0.95
  arrival_rate: 2.375  # CHANGED: Was 1.0 (ρ=0.4)
  service_rates: [1.0, 1.5]
  alpha: 1.0  # Can sweep [0.1, 10.0] for sensitivity analysis

simulation:
  num_replications: 20  # INCREASED: Better statistical power
  seed: 42
  burn_in_fraction: 0.1  # REDUCED: Critical load reaches steady-state faster
  export_trajectories: false
  ssa:
    sim_time: 50000.0  # INCREASED: Longer for critical load convergence
    sample_interval: 1.0
  dga:
    sim_steps: 5000
    temperature: 0.5

policy:
  name: softmax
  d: 2

drift:
  # SOTA: Adaptive q_max based on theoretical compact radius
  # At ρ=0.95: ε = 0.0625, R ≈ 4.08, compact_radius ≈ 82
  # q_max = 2 * compact_radius = 164 (rounded to 200)
  q_max: 200  # CHANGED: Was 50 (insufficient for critical load)
  use_grid: true

# SOTA: Extended stability sweep for full parameter space
stability_sweep:
  alpha_vals: [0.01, 0.1, 0.5, 1.0, 2.0, 5.0, 10.0, 50.0, 100.0]
  rho_vals: [0.80, 0.85, 0.90, 0.95, 0.98]

# SOTA: Stress testing with critical loads
stress:
  n_values: [2, 4, 8]  # Grid feasible for N≤3, trajectory for N>3
  critical_rhos: [0.90, 0.95, 0.98]

neural_training:
  learning_rate: 3e-3
  dga_learning_rate: 0.1
  weight_decay: 1e-4
  min_temperature: 0.3
  gamma: 0.99
  gae_lambda: 0.95
  curriculum:
    - [10, 500]
    - [20, 2000]
    - [30, 10000]  # INCREASED: Longer horizons for critical load

jax:
  enabled: false
  platform: auto
  precision: float64  # HIGH PRECISION: Critical load needs stable numerics
  fallback_to_cpu: true

wandb:
  enabled: false
  project: GibbsQ-SOTA
  
batch_size: 64

neural:
  hidden_size: 128
  preprocessing: log1p
  init_type: zero_final
  use_rho: true
  rho_input_scale: 10.0
  entropy_bonus: 0.01
  clip_global_norm: 0.5
  actor_lr: 0.0003
  critic_lr: 0.003
  weight_decay: 0.0001

train_epochs: 100

# SOTA: Extended domain randomization for critical load generalization
domain_randomization:
  enabled: true
  rho_min: 0.70  # CHANGED: Start from higher load
  rho_max: 0.98  # CHANGED: Include critical regime

output_dir: outputs/sota

# ============================================================================
# THEORETICAL CONSTANTS (computed from system parameters)
# ============================================================================
# For N=2, λ=2.375, μ=[1.0, 1.5], α=1.0:
#
# Λ (total capacity)    = 2.5
# ρ (load factor)       = 0.95
# ε (contraction rate)  = min((2.5-2.375)/2, 1.0) = 0.0625
# R (drift constant)    = (2.375*log(2))/1.0 + (2.375+2.5)/2 = 1.646 + 2.4375 = 4.08
# compact_radius        = (4.08 + 1) / 0.0625 ≈ 82
#
# IMPLICATION: q_max must be ≥ 82 for full compact coverage
# This config uses q_max=200 (2.4x safety margin)
# ============================================================================
