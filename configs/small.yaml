# Small self-contained profile configuration

system:
  num_servers: 2
  arrival_rate: 1.0
  service_rates: [1.0, 1.5]
  alpha: 1.0

simulation:
  num_replications: 10
  seed: 42
  burn_in_fraction: 0.2
  export_trajectories: false
  ssa:
    sim_time: 5000.0
    sample_interval: 1.0
  dga:
    sim_steps: 1000
    temperature: 0.5

policy:
  name: uas
  d: 2

drift:
  q_max: 50
  use_grid: true

stability_sweep:
  alpha_vals: [0.1, 1.0, 5.0]
  rho_vals: [0.5, 0.8, 0.9]

stress:
  n_values: [4, 8, 16]
  critical_rhos: [0.9, 0.95]
  mu_het: [10.0, 0.1, 0.1, 0.1]
  sample_interval: 1.0
  massive_n_rho: 0.8
  massive_n_sim_time: 500.0
  critical_load_n: 10
  critical_load_base_rho: 0.8
  critical_load_max_sim_time: 100000.0
  heterogeneity_rho: 0.5
  heterogeneity_sim_time: 1000.0

neural_training:
  learning_rate: 3e-3
  dga_learning_rate: 0.1
  weight_decay: 1e-4
  min_temperature: 0.3
  gamma: 0.99
  gae_lambda: 0.95
  curriculum:
    - [10, 200]
    - [20, 1000]
    - [20, 3000]
  eval_batches: 2
  eval_trajs_per_batch: 5
  perf_index_min_denom: 0.5
  perf_index_jsq_margin: 0.05
  bc_num_steps: 1000
  bc_lr: 0.002
  bc_label_smoothing: 0.1
  shake_scale: 0.01
  checkpoint_freq: 25
  squash_scale: 100.0
  squash_threshold: 500.0

neural:
  hidden_size: 128
  preprocessing: log1p
  init_type: zero_final
  use_rho: true
  use_service_rates: true
  rho_input_scale: 10.0
  entropy_bonus: 0.01
  entropy_final: 0.001
  clip_global_norm: 0.5
  actor_lr: 0.0003
  critic_lr: 0.003
  lr_decay_rate: 0.9
  weight_decay: 0.0001

bc_data:
  rhos: [0.45, 0.65, 0.85]
  mu_scales: [0.5, 1.0, 2.0]
  samples_per_rho: 1000
  expert_sim_time: 1500.0
  sample_interval: 1.0
  augmentation_noise_min: -1
  augmentation_noise_max: 1

domain_randomization:
  enabled: true
  rho_min: 0.4
  rho_max: 0.85

generalization:
  rho_boundary_vals: [0.95]
  scale_vals: [0.5, 2.0]
  rho_grid_vals: [0.5, 0.85]

jax:
  enabled: false
  platform: auto
  precision: float32
  fallback_to_cpu: true

jax_engine:
  max_events_safety_multiplier: 1.5
  max_events_additive_buffer: 1000
  scan_sampling_chunk: 16

wandb:
  enabled: false
  project: GibbsQ-Small
  mode: offline
  run_name: null

verification:
  parity_threshold_percent: 25.0
  jacobian_rel_tol: 0.05
  alpha_significance: 0.05
  confidence_interval: 0.95
  stationarity_threshold: 1.0
  parity_z_score: 1.96
  gradient_check_chunk_size: 500
  gradient_check_max_steps: 100
  gradient_check_n_test: 50
  gradient_check_sim_time: 10.0
  gradient_check_n_samples: 5000
  gradient_check_epsilon: 0.05
  gradient_check_cosine_threshold: 0.9
  gradient_check_error_threshold: 0.40
  gradient_shake_scale: 0.1

output_dir: outputs/small
log_dir: ${output_dir}/logs
train_epochs: 30
batch_size: 16

experiments:
  check_configs: {}
  hyperqual:
    study:
      stage: A
      mode: full
      candidate_manifest: null
      candidate_count: 12
      promote_top_k: 3
      seed_values: []
      random_seed: 20260331
      full_certification: false
      allow_wandb: false
  reinforce_check:
    system:
      num_servers: 2
      arrival_rate: 1.0
      service_rates: [1.0, 1.5]
      alpha: 1.0
    neural:
      hidden_size: 128
      preprocessing: log1p
      init_type: zero_final
      use_rho: true
      use_service_rates: true
      rho_input_scale: 10.0
      entropy_bonus: 0.01
      entropy_final: 0.001
      clip_global_norm: 0.5
      actor_lr: 0.0003
      critic_lr: 0.003
      lr_decay_rate: 0.9
      weight_decay: 0.0001
    jax:
      enabled: false
      platform: auto
      precision: float32
      fallback_to_cpu: true
    verification:
      gradient_check_chunk_size: 500
      gradient_check_max_steps: 100
      gradient_check_n_test: 50
      gradient_check_hidden_size: null
      gradient_check_sim_time: 10.0
      gradient_check_n_samples: 5000
      gradient_check_epsilon: 0.05
      gradient_check_cosine_threshold: 0.9
      gradient_check_error_threshold: 0.40
      gradient_shake_scale: 0.1
  drift:
    policy:
      name: softmax
      d: 2
  sweep:
    jax:
      enabled: true
      platform: auto
      precision: float32
      fallback_to_cpu: true
    wandb:
      enabled: true
      mode: offline
      project: GibbsQ-Paper
      group: stability_sweep
  stress:
    jax:
      enabled: true
  policy:
    jax:
      enabled: true
      platform: auto
      precision: float32
      fallback_to_cpu: true
    wandb:
      enabled: true
      mode: offline
      project: GibbsQ-Paper
      group: policy_evaluation
  bc_train: {}
  reinforce_train:
    simulation:
      ssa:
        sim_time: 1000.0
    jax:
      enabled: true
      platform: auto
      precision: float32
      fallback_to_cpu: true
    neural_training:
      eval_batches: 1
      eval_trajs_per_batch: 3
    train_epochs: 5
    batch_size: 4
  stats: {}
  generalize: {}
  ablation: {}
  critical: {}
