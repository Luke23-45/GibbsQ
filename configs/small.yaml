# Small system for quick validation

system:
  num_servers: 2
  arrival_rate: 1.0
  service_rates: [1.0, 1.5]
  # Λ = 2.5, ρ = 0.4
  alpha: 1.0

simulation:
  sim_time: 1000.0
  sample_interval: 0.05
  num_replications: 3
  seed: 42
  burn_in_fraction: 0.2
  export_trajectories: false

policy:
  name: softmax
  d: 2

drift:
  q_max: 50
  use_grid: true

stability_sweep:
  alpha_vals: [0.1, 1.0, 5.0]
  rho_vals: [0.5, 0.8, 0.9]

neural_training:
  learning_rate: 3e-3
  dga_learning_rate: 1e-3
  weight_decay: 1e-4
  curriculum:
    - [5, 100]
    - [10, 500]

jax:
  enabled: false
  platform: auto
  precision: float32
  fallback_to_cpu: true

wandb:
  enabled: false
  project: GibbsQ-Small

output_dir: outputs/small
