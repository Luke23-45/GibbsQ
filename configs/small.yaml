# Small system for quick validation
# PATCH 2026-03-12: Added stress: section.
# Without it, hydra_to_config falls back to StressConfig dataclass defaults
# which include n_values=[4,8,16,32,64] and critical_rhos=[0.95,0.98,0.99,0.995].
# For a "small" validation run N=32/64 are unnecessarily slow; rho=0.995 requires
# very long sim_time to reach stationarity and adds no value in quick CI runs.

system:
  num_servers: 2
  arrival_rate: 1.0
  service_rates: [1.0, 1.5]
  # Λ = 2.5, ρ = 0.4
  alpha: 1.0

simulation:
  num_replications: 10
  seed: 42
  burn_in_fraction: 0.2
  export_trajectories: false
  ssa:
    sim_time: 1000.0
    sample_interval: 1.0
  dga:
    sim_steps: 1000
    temperature: 0.5

policy:
  name: softmax
  d: 2

drift:
  q_max: 50
  use_grid: true

stability_sweep:
  alpha_vals: [0.1, 1.0, 5.0]
  rho_vals: [0.5, 0.8, 0.9]

# PATCH BUG-4: Explicit stress section — prevents StressConfig dataclass
# defaults from silently being used and avoids oversized N/rho combinations.
stress:
  n_values: [4, 8, 16]          # small validation; skip 32/64 for speed
  critical_rhos: [0.9, 0.95]   # two rho values sufficient for quick checks

neural_training:
  learning_rate: 3e-3
  dga_learning_rate: 0.1
  weight_decay: 1e-4
  min_temperature: 0.3   # HP#2 FIX: Raise floor to 0.3 to prevent late-stage loss regression (PR#2)
  curriculum:
    - [10, 200]
    - [20, 1000]
    - [20, 3000]

jax:
  enabled: false
  platform: auto
  precision: float32
  fallback_to_cpu: true

wandb:
  enabled: false
  project: GibbsQ-Small
  
batch_size: 32  # PI-V4.3: Increased from 16 to 32 for refined variance reduction

neural:
  hidden_size: 64
  preprocessing: log1p
  init_type: zero_final
  use_rho: true
  rho_input_scale: 10.0
  entropy_bonus: 0.01  # STABILITY FIX: Increased from 0.001 to prevent premature policy collapse
  grad_clip: 1.0
  actor_lr: 0.001  # actor learning rate
  critic_lr: 0.001 # STABILITY FIX: Increased from 0.0001/3e-4 to ensure baseline adapts at same speed as actor
  weight_decay: 0.0001

train_epochs: 100  # FIX: Increased from 30 for more learning

output_dir: outputs/small
