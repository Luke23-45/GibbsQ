# @package _global_

defaults:
  - default
  - _self_

jax:
  enabled: true
  platform: auto
  precision: float32
  fallback_to_cpu: true

system:
  num_servers: 100
  arrival_rate: 90.0
  service_rates: [1.0] # Will be expanded dynamically in scripts
  alpha: 1.0

simulation:
  sim_time: 1000
  num_replications: 1024
  sample_interval: 1.0
  export_trajectories: false
  seed: 42
  burn_in_fraction: 0.2

wandb:
  mode: online
  project: GibbsQ-Massive-Regime
  group: global_sweep
