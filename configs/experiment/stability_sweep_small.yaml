# @package _global_

# Fast validation parameters for small-scale stability sweep
simulation:
  num_replications: 5
  sim_time: 1000.0
  burn_in_fraction: 0.2
  sample_interval: 1.0

jax:
  enabled: true
  platform: auto
  precision: float32
  fallback_to_cpu: true

wandb:
  enabled: true
  mode: offline
  project: GibbsQ-Paper
  group: stability_sweep
