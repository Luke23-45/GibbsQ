# @package _global_

# Safe parameters for large-scale policy comparison (avoids GPU OOM)
simulation:
  num_replications: 100
  sim_time: 5000.0
  burn_in_fraction: 0.2
  sample_interval: 1.0

jax:
  enabled: true
  platform: auto
  precision: float32
  fallback_to_cpu: true

wandb:
  enabled: true
  mode: offline
  project: GibbsQ-Paper
  group: policy_evaluation
