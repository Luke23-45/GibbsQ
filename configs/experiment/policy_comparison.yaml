# @package _global_

# Runtime-balanced parameters for the baseline policy comparison
simulation:
  num_replications: 20
  sim_time: 5000.0
  burn_in_fraction: 0.2
  sample_interval: 0.5

jax:
  enabled: true
  platform: auto
  precision: float32
  fallback_to_cpu: true

wandb:
  enabled: true
  mode: offline
  project: GibbsQ-Paper
  group: policy_evaluation
