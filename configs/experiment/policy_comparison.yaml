# @package _global_

# Policy comparison experiment overlay.
# NOTE: simulation parameters (sim_time, num_replications, sample_interval)
# are intentionally NOT overridden here. They inherit from the base config
# (small.yaml, default.yaml, large.yaml) so each scale runs with its own
# appropriate parameters and memory footprint.

jax:
  enabled: true
  platform: auto
  precision: float32
  fallback_to_cpu: true

wandb:
  enabled: true
  mode: offline
  project: GibbsQ-Paper
  group: policy_evaluation
