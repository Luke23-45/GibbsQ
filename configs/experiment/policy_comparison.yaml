# @package _global_

# Runtime-balanced parameters for the baseline policy comparison
simulation:
  num_replications: 50
  ssa:
    sim_time: 5000.0
    sample_interval: 1.0

jax:
  enabled: true
  platform: auto
  precision: float32
  fallback_to_cpu: true

wandb:
  enabled: true
  mode: offline
  project: GibbsQ-Paper
  group: policy_evaluation
