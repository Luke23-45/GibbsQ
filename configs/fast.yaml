# Fast debug configuration - optimized for quick iteration
# Reduces sim_time and batch_size for speed while maintaining DR functionality

system:
  num_servers: 2
  arrival_rate: 1.0
  service_rates: [1.0, 1.5]
  # Λ = 2.5, ρ = 0.4
  alpha: 1.0

simulation:
  num_replications: 10
  seed: 42
  burn_in_fraction: 0.2
  export_trajectories: false
  ssa:
    sim_time: 1000.0  # FAST: Reduced from 5000 for speed (5x faster)
    sample_interval: 1.0
  dga:
    sim_steps: 1000
    temperature: 0.5

policy:
  name: sojourn_softmax
  d: 2

drift:
  q_max: 50
  use_grid: true

# Minimal stress section for fast loading
stress:
  n_values: [4, 8]
  critical_rhos: [0.9]
  mu_het: [10.0, 0.1, 0.1, 0.1]
  sample_interval: 1.0
  massive_n_rho: 0.8
  massive_n_sim_time: 500.0
  critical_load_n: 10
  critical_load_base_rho: 0.8
  critical_load_max_sim_time: 100000.0
  heterogeneity_rho: 0.5
  heterogeneity_sim_time: 1000.0

neural_training:
  learning_rate: 3e-3
  dga_learning_rate: 0.1
  weight_decay: 1e-4
  min_temperature: 0.3
  gamma: 0.99
  gae_lambda: 0.95
  # FAST: Single-phase curriculum with short sim_time
  curriculum:
    - [20, 1000]  # 20 epochs at 1000s (vs 3 phases at up to 3000s)
  eval_batches: 1           # FAST: Reduced from 2
  eval_trajs_per_batch: 3   # FAST: Reduced from 5 (3 vs 10 eval trajs)
  perf_index_min_denom: 0.5
  perf_index_jsq_margin: 0.05
  bc_num_steps: 200         # FAST: Reduced from 1000 (sufficient for small network)
  bc_lr: 0.002
  bc_label_smoothing: 0.1
  shake_scale: 0.01
  checkpoint_freq: 10       # FAST: More frequent checkpoints for short runs
  squash_scale: 100.0
  squash_threshold: 500.0

jax:
  enabled: true
  platform: auto
  precision: float32
  fallback_to_cpu: true

wandb:
  enabled: false
  project: GibbsQ-Fast

# FAST: Reduced batch size for speed
batch_size: 16  # Reduced from 64 (4x faster per epoch)

neural:
  hidden_size: 64   # FAST: Reduced from 128 (smaller network, faster training)
  preprocessing: log1p
  init_type: zero_final
  use_rho: true
  rho_input_scale: 10.0
  entropy_bonus: 0.01
  entropy_final: 0.001
  clip_global_norm: 0.5
  actor_lr: 0.001   # FAST: Slightly higher for faster convergence
  critic_lr: 0.005  # FAST: Higher critic LR for faster baseline
  lr_decay_rate: 0.9
  weight_decay: 0.0001

# FAST: Much fewer epochs for quick validation
train_epochs: 30  # Reduced from 100 (3x faster total)

# Domain Randomization enabled for generalization testing
domain_randomization:
  enabled: true
  rho_min: 0.4
  rho_max: 0.98

generalization:
  rho_boundary_vals: [0.95]
  scale_vals: [0.5, 2.0]
  rho_grid_vals: [0.5, 0.85]

verification:
  alpha_significance: 0.05
  confidence_interval: 0.95
  stationarity_threshold: 0.5
  parity_z_score: 1.96
  gradient_check_chunk_size: 100  # FAST: Reduced for speed
  gradient_check_max_steps: 50
  gradient_check_n_test: 100
  gradient_check_sim_time: 5.0
  gradient_check_n_samples: 1000
  gradient_check_epsilon: 0.05
  gradient_check_cosine_threshold: 0.9
  gradient_check_error_threshold: 0.30
  gradient_shake_scale: 0.1

output_dir: outputs/fast
